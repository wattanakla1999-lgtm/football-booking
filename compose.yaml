services:
  app:
    image: football-booking:latest
    build:
      context: .
      dockerfile: Dockerfile
      secrets:
        - app_env
    container_name: football-booking
    restart: unless-stopped
    init: true
    env_file:
      - .env
    ports:
      - "127.0.0.1:${APP_PORT:-3001}:3000"

secrets:
  app_env:
    file: .env